<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Raceboy x Escobar Admin</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body{background:#10131a;color:#fff;}
    .navbar{background:#111827!important;box-shadow:0 8px 24px rgba(0,0,0,.25);}
    .navbar-brand,.nav-link{color:#fff!important;font-weight:700;}
    .page-wrap{padding:95px 0 40px;}
    .card-box{background:#171b24;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:24px;box-shadow:0 12px 30px rgba(0,0,0,.18);}
    .table{color:#fff;}
    .table thead th{border-color:#2d3442;}
    .table td,.table th{border-color:#2d3442;vertical-align:middle;}
    .btn-main{background:#8b5cf6;color:#fff;border:none;border-radius:12px;padding:10px 18px;font-weight:700;}
    .form-control,.custom-select{background:#0f1117;color:#fff;border:1px solid #2d3442;border-radius:12px;}
    .form-control:focus,.custom-select:focus{background:#0f1117;color:#fff;border-color:#8b5cf6;box-shadow:none;}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-md fixed-top">
  <a href="/" class="navbar-brand">Raceboy x Escobar Admin</a>
  <div class="navbar-nav mr-auto">
    <a href="/view-customer" class="nav-link">Vásárlók</a>
    <a href="/admin-view-booking" class="nav-link">Rendelések</a>
    <a href="/admin-products" class="nav-link">Termékek</a>
  </div>
  <div class="navbar-nav"><a href="/logout" class="nav-link">Kilépés</a></div>
</nav>
<div class="page-wrap container">{% block content %}{% endblock content %}</div>
</body>
</html>
