<!DOCTYPE html>
{% load static %}
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Raceboy x Escobar Shop</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>
  <style>
    body{background:#0f1115;color:#fff;font-family:Arial,sans-serif;}
    .brand-nav{background:linear-gradient(90deg,#111827,#1f2937);border:0;border-radius:0;margin-bottom:0;padding:10px 0;box-shadow:0 8px 24px rgba(0,0,0,.22);}
    .brand-title{font-size:28px;font-weight:700;color:#fff!important;text-decoration:none!important;}
    .brand-sub{display:block;font-size:12px;color:#b8c1cc;margin-top:4px;}
    .nav-links a{color:#d9e1ea!important;font-weight:600;}
    .nav-links a:hover{color:#fff!important;}
    .search-box input{height:44px;border-radius:12px 0 0 12px;border:0;}
    .search-box button{height:44px;border-radius:0 12px 12px 0;border:0;background:#8b5cf6;color:#fff;font-weight:700;}
    .cart-btn{display:inline-block;background:#8b5cf6;color:#fff!important;padding:11px 18px;border-radius:12px;text-decoration:none!important;font-weight:700;margin-top:2px;}
    .cart-btn .badge{background:#111827;margin-left:8px;}
    .hero{padding:60px 0 30px;}
    .hero-card{background:linear-gradient(135deg,#111827,#1f2937 60%,#312e81);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:38px;box-shadow:0 16px 50px rgba(0,0,0,.32);}
    .hero h1{margin:0 0 12px;font-size:42px;font-weight:800;}
    .hero p{color:#cbd5e1;font-size:16px;max-width:760px;}
    .hero-tags span{display:inline-block;background:rgba(255,255,255,.08);padding:10px 14px;border-radius:999px;margin:8px 8px 0 0;font-size:13px;}
    .section-title{font-size:28px;font-weight:800;margin:38px 0 18px;}
    .section-sub{color:#9ca3af;margin-top:-8px;margin-bottom:20px;}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;}
    .product-card{background:#171a21;border:1px solid rgba(255,255,255,.07);border-radius:22px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.2);height:100%;}
    .product-thumb{height:240px;background:#0b0d11;display:flex;align-items:center;justify-content:center;}
    .product-thumb img{max-width:100%;max-height:100%;object-fit:cover;}
    .product-body{padding:18px;}
    .product-body h4{margin:0 0 8px;font-size:20px;font-weight:800;}
    .product-meta{font-size:12px;color:#b3b9c5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
    .product-desc{color:#d6d9df;min-height:44px;}
    .product-price{font-size:24px;font-weight:800;margin:16px 0 14px;}
    .buy-btn{display:inline-block;background:#fff;color:#111827!important;padding:10px 16px;border-radius:12px;text-decoration:none!important;font-weight:800;}
    .empty-box{background:#171a21;border:1px dashed rgba(255,255,255,.16);padding:26px;border-radius:18px;color:#b8c1cc;}
    footer{margin-top:60px;padding:28px 0;border-top:1px solid rgba(255,255,255,.08);color:#9ca3af;background:#0b0d11;}
    @media (max-width:768px){.hero h1{font-size:30px}.brand-title{font-size:22px}.search-box{margin:15px 0}}
  </style>
</head>
<body>
  {% include 'ecom/navbar.html' %}
  <div class="container">{% block content %}{% endblock content %}</div>
  {% include 'ecom/footer.html' %}
</body>
</html>
