<div class="product-card">
  <div class="product-thumb">
    {% if p.product_image %}<img src="{{ p.product_image.url }}" alt="{{ p.name }}">{% else %}<div style="color:#6b7280;font-weight:700;">Nincs kép</div>{% endif %}
  </div>
  <div class="product-body">
    <div class="product-meta">{{ p.get_category_display }}</div>
    <h4>{{ p.name }}</h4>
    <div class="product-desc">{{ p.description|default:'Nincs rövid leírás.' }}</div>
    <div class="product-price">{{ p.price }} Ft</div>
    <a class="buy-btn" href="{% url 'add-to-cart' p.id %}">Kosárba</a>
  </div>
</div>
